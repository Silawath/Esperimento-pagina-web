<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Esecuzione Compiti</title>
    <link rel="stylesheet" href="style.css">
    <script src="flow.js"></script>
    <style>
        /* AUMENTATA SPAZIATURA E GRANDEZZA BOX */
        .task-item {
            background: #333;
            padding: 20px;          /* Aumentato da 15px */
            margin-bottom: 25px;    /* Aumentato da 10px per distanziare */
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .task-label { font-weight: bold; font-size: 1.2rem; color: white; }
        
        .timer-display { 
            font-family: monospace; 
            color: #88C0D0; 
            font-size: 1.4rem; /* Leggermente più grande */
            margin-right: 20px; 
            min-width: 70px;
            text-align: right;
        }
        
        .btn-timer {
            padding: 12px 20px;
            width: auto;
            margin: 0 5px; /* Spazio laterale tra i bottoni */
            font-size: 1rem;
            min-width: 100px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            color: white;
            font-weight: bold;
        }

        .btn-start { background-color: #4CAF50; } /* Verde */
        .btn-stop { background-color: #e74c3c; display: none; } /* Rosso */
        .btn-done { background-color: #555; color: #aaa; cursor: default; display: none; } /* Grigio */
        
        /* STILE TASTO RESET */
        .btn-reset { 
            background-color: #EBCB8B; /* Giallo/Arancio */
            color: #2E3440;
            display: none; /* Nascosto all'inizio */
            min-width: 50px; /* Più piccolo */
            font-size: 1.2rem;
            padding: 10px;
        }
        .btn-reset:hover { background-color: #d0b070; }

    </style>
</head>
<body>
    <h1 id="phase-title">Compiti Sperimentali</h1>
    <p style="text-align:center; color:#ccc; margin-bottom:30px">
        Premi START per avviare il cronometro.<br>
        Usa il tasto ↺ per resettare se hai sbagliato click.
    </p>

    <div id="task-list"></div>

    <button onclick="saveAndNext()" style="margin-top:40px; background-color:#5E81AC;">✅ TUTTI I COMPITI COMPLETATI</button>

    <script>
        const tasks = [
            { id: 'lettura', label: '1. Lettura' },
            { id: 'cancsimb', label: '2. Cancellazione Simboli' },
            { id: 'double', label: '3. Double' },
            { id: 'ops', label: '4. Operazioni' },
            { id: 's1', label: '5. Stroop Parte 1' },
            { id: 's2', label: '6. Stroop Parte 2' },
            { id: 's3', label: '7. Stroop Parte 3' },
            { id: 'canclet', label: '8. Cancellazione Lettere' }
        ];

        let timings = {}; 
        let intervals = {};

        function init() {
            const container = document.getElementById('task-list');
            // Gestione sicura nel caso flow.js non abbia ancora settato il nome
            const phaseName = (typeof getCurrentLightName === 'function') ? getCurrentLightName() : "Sconosciuta";
            document.getElementById('phase-title').innerText = `Compiti: Fase ${phaseName}`;

            tasks.forEach(task => {
                container.innerHTML += `
                <div class="task-item">
                    <span class="task-label">${task.label}</span>
                    <div style="display:flex; align-items:center">
                        <span id="display_${task.id}" class="timer-display">00:00</span>
                        
                        <button id="btn_start_${task.id}" class="btn-timer btn-start" onclick="startTimer('${task.id}')">▶️ START</button>
                        <button id="btn_stop_${task.id}" class="btn-timer btn-stop" onclick="stopTimer('${task.id}')">⏹️ STOP</button>
                        <button id="btn_done_${task.id}" class="btn-timer btn-done">COMPLETATO</button>
                        
                        <button id="btn_reset_${task.id}" class="btn-timer btn-reset" onclick="resetTimer('${task.id}')" title="Resetta Timer">↺</button>
                    </div>
                </div>`;
            });
        }

        function startTimer(id) {
            // UI Update
            document.getElementById(`btn_start_${id}`).style.display = 'none';
            document.getElementById(`btn_stop_${id}`).style.display = 'block';
            document.getElementById(`btn_reset_${id}`).style.display = 'block'; // Mostra reset
            
            // Logic
            timings[id] = { start: Date.now(), duration: 0 };
            
            // Interval
            const display = document.getElementById(`display_${id}`);
            intervals[id] = setInterval(() => {
                const delta = Math.floor((Date.now() - timings[id].start) / 1000);
                const m = Math.floor(delta / 60).toString().padStart(2, '0');
                const s = (delta % 60).toString().padStart(2, '0');
                display.innerText = `${m}:${s}`;
            }, 1000);
        }

        function stopTimer(id) {
            clearInterval(intervals[id]);
            
            // Calcolo preciso durata
            const end = Date.now();
            const durationSec = (end - timings[id].start) / 1000;
            timings[id].duration = durationSec;

            // UI Update
            document.getElementById(`btn_stop_${id}`).style.display = 'none';
            document.getElementById(`btn_done_${id}`).style.display = 'block';
            // Nota: Lasciamo il tasto reset visibile nel caso si voglia rifare
            
            // Display finale
            const m = Math.floor(durationSec / 60).toString().padStart(2, '0');
            const s = (Math.floor(durationSec % 60)).toString().padStart(2, '0');
            document.getElementById(`display_${id}`).innerText = `${m}:${s}`;
            document.getElementById(`display_${id}`).style.color = "#4CAF50"; // Verde conferma
        }

        // NUOVA FUNZIONE RESET
        function resetTimer(id) {
            if(!confirm("Sei sicuro di voler resettare questo cronometro a zero?")) return;

            // Ferma eventuale intervallo attivo
            clearInterval(intervals[id]);
            
            // Resetta dati
            delete timings[id];

            // Resetta UI
            const display = document.getElementById(`display_${id}`);
            display.innerText = "00:00";
            display.style.color = "#88C0D0"; // Torna colore originale

            document.getElementById(`btn_start_${id}`).style.display = 'block';
            document.getElementById(`btn_stop_${id}`).style.display = 'none';
            document.getElementById(`btn_done_${id}`).style.display = 'none';
            document.getElementById(`btn_reset_${id}`).style.display = 'none'; // Nasconde se stesso
        }

        function saveAndNext() {
            // Controllo timer attivi
            if (Object.keys(intervals).some(k => document.getElementById(`btn_stop_${k}`).style.display === 'block')) {
                return alert("⚠️ Attenzione: ferma tutti i cronometri prima di proseguire!");
            }

            // Preparazione dati
            let savedData = {};
            tasks.forEach(t => {
                savedData[t.id] = timings[t.id] ? timings[t.id].duration : 0;
            });

            // Salvataggio
            const lightName = (typeof getCurrentLightName === 'function') ? getCurrentLightName() : "ND";
            const key = `PERFORMANCE_TIMES_${lightName}`; 
            localStorage.setItem(key, JSON.stringify(savedData));

            nextStep();
        }

        init();
    </script>
</body>
</html>
